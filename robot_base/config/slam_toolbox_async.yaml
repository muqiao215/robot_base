slam_toolbox:
  ros__parameters:
    use_sim_time: false
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping
    
    # 地图参数
    resolution: 0.05
    map_update_interval: 5.0
    max_laser_range: 12.0
    
    # 匹配参数
    minimum_time_interval: 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: false
    
    # 激光参数
    max_range: 15.0
    minimum_range: 0.2
    
    # 图优化参数
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_max_num_iterations: 25
    ceres_min_line_search_step_size: 0.01
    ceres_function_tolerance: 1e-6
    ceres_gradient_tolerance: 1e-10
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.03
    correlation_search_space_smear_deviation: 0.025
    
    # 闭环检测
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.55
    loop_match_minimum_response_fine: 0.75
